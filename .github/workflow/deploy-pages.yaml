name: Deploy Simulator (AI Off)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_ALLOW_AI_MODE: "false"
      VITE_DEFAULT_GRADING_MODE: "predefined"
      # If this is a project page repo, uncomment and set:
      VITE_BASE_PATH: "simulator"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: simulator/package-lock.json

      - name: Install
        working-directory: simulator
        run: npm ci

      - name: Build
        working-directory: simulator
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: simulator/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
